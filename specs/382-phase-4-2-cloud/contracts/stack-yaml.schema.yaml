# JSON Schema for .generacy/stack.yaml
# Generated by speckit for feature 382-phase-4-2-cloud

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Generacy Stack Detection Output"
description: "Schema for .generacy/stack.yaml — machine-readable tech stack detection results consumed by /onboard:plugins and /onboard:mcp"
type: object

required:
  - version
  - languages

properties:
  version:
    type: string
    const: "1"
    description: "Schema version"

  languages:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected programming languages"

  frameworks:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected frameworks (React, Express, FastAPI, etc.)"

  buildTools:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected build tools (turbo, webpack, vite, etc.)"

  testing:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected testing frameworks (vitest, jest, pytest, etc.)"

  ciCd:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected CI/CD systems (GitHub Actions, GitLab CI, etc.)"

  infrastructure:
    type: array
    items:
      $ref: "#/$defs/DetectedItem"
    description: "Detected infrastructure (Docker, Firebase, databases, etc.)"

  packageManager:
    type: string
    enum: [npm, pnpm, yarn, bun]
    description: "Detected package manager"

  monorepo:
    type: boolean
    description: "Whether the project is a monorepo (workspaces, turbo, nx)"

  detectedAt:
    type: string
    format: date-time
    description: "ISO 8601 timestamp of when detection was performed"

$defs:
  DetectedItem:
    type: object
    required:
      - name
      - confidence
    properties:
      name:
        type: string
        minLength: 1
        description: "Name of the detected technology"
      version:
        type: string
        description: "Detected version (from dependency files, config, etc.)"
      confidence:
        type: string
        enum: [high, medium, low]
        description: "Detection confidence level"
      source:
        type: string
        description: "File or method that produced this detection"
