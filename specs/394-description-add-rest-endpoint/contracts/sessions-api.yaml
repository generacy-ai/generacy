openapi: 3.0.3
info:
  title: Sessions API
  version: 1.0.0

paths:
  /sessions:
    get:
      summary: List Claude Code sessions
      description: |
        Scans ~/.claude/projects/ directories, parses JSONL session files,
        and returns paginated session metadata sorted by last activity descending.
      tags:
        - Sessions
      parameters:
        - name: workspace
          in: query
          required: false
          description: Filter by workspace identifier (from orchestrator config) or path
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

components:
  schemas:
    SessionType:
      type: string
      enum:
        - automated
        - developer

    SessionMetadata:
      type: object
      required:
        - sessionId
        - startedAt
        - lastActivityAt
        - messageCount
        - type
      properties:
        sessionId:
          type: string
          format: uuid
          description: Session UUID (from filename)
        slug:
          type: string
          nullable: true
          description: Human-readable session name
        startedAt:
          type: string
          format: date-time
          description: Timestamp of first message
        lastActivityAt:
          type: string
          format: date-time
          description: Timestamp of last message
        messageCount:
          type: integer
          minimum: 0
          description: Number of user + assistant messages
        model:
          type: string
          nullable: true
          description: Claude model used
        gitBranch:
          type: string
          nullable: true
          description: Git branch active during session
        type:
          $ref: '#/components/schemas/SessionType'
        workspace:
          type: string
          nullable: true
          description: Decoded workspace directory path

    Pagination:
      type: object
      required:
        - page
        - pageSize
        - total
        - hasMore
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0
        hasMore:
          type: boolean

    SessionListResponse:
      type: object
      required:
        - sessions
        - pagination
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionMetadata'
        pagination:
          $ref: '#/components/schemas/Pagination'
