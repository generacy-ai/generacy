# GET /credentials/:id/value — Control-Plane Endpoint
# Exposes decrypted credential secrets over the local Unix socket.
# Used by the host CLI (via docker compose exec) to fetch registry credentials.

endpoint:
  method: GET
  path: /credentials/{id}/value
  transport: Unix socket (/run/generacy-control-plane/control.sock)

parameters:
  id:
    type: string
    required: true
    description: Credential identifier (e.g., "registry-ghcr.io")
    pattern: "^[a-z0-9][a-z0-9._-]*$"

responses:
  200:
    description: Decrypted credential value
    content_type: application/json
    body:
      type: object
      properties:
        value:
          type: string
          description: Raw decrypted secret (JSON string for registry creds)
      required: [value]
    example:
      value: '{"username":"_token","password":"ghp_xxxx..."}'

  404:
    description: Credential not found in backend
    content_type: application/json
    body:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          enum: [CREDENTIAL_NOT_FOUND]
    example:
      error: "Credential 'registry-ghcr.io' not found"
      code: CREDENTIAL_NOT_FOUND

  500:
    description: Backend error (decrypt failure, store unavailable)
    content_type: application/json
    body:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          enum: [BACKEND_ERROR]
    example:
      error: "Failed to fetch credential value"
      code: BACKEND_ERROR

security:
  - Local Unix socket callers only (no network exposure)
  - Audit-logged via relay event on cluster.credentials channel

audit_event:
  channel: cluster.credentials
  payload:
    action: credential_value_read
    credentialId: "{id}"
    timestamp: ISO-8601

notes:
  - Calls ClusterLocalBackend.fetchSecret(id) directly
  - Returns raw string value (caller responsible for JSON parsing)
  - Separate from existing GET /credentials/:id (metadata-only endpoint)
  - Control-plane process has access to backend via module-scoped singleton
