# Speckit Bugfix Workflow
#
# Simplified bug fix workflow for quick iterations.
# Skips clarification and detailed planning phases for faster turnaround.
#
# Usage:
#   generacy run workflows/speckit-bugfix.yaml --input description="Bug description" --input issue_number=123
#
# Inputs:
#   - description: Bug description (required)
#   - issue_number: GitHub issue number for the bug (optional)
#   - short_name: Branch short name override (optional)
#
name: speckit-bugfix

description: |
  Simplified bug fix workflow for quick iterations.
  Creates a feature branch, generates a minimal spec with fix approach,
  creates focused tasks, and implements the fix.
  Skips clarification and detailed planning for faster turnaround.

version: "1.0.0"

inputs:
  - name: description
    description: Bug description including expected vs actual behavior
    type: string
    required: true

  - name: issue_number
    description: GitHub issue number for the bug (for linking)
    type: number
    required: false

  - name: short_name
    description: Optional short name for the bug fix branch
    type: string
    required: false

phases:
  # Phase 1: Setup
  - name: setup
    steps:
      - name: create-feature
        uses: speckit.create_feature
        with:
          description: "fix: ${{ inputs.description }}"
          short_name: ${{ inputs.short_name }}

  # Phase 2: Minimal Specification
  # For bugs, we need a focused spec on the fix approach
  - name: specification
    steps:
      - name: specify
        uses: speckit.specify
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}
        # No gate - bugs are typically urgent

  # Phase 3: Quick Task Generation
  # Skip detailed planning, go directly to tasks
  - name: task-generation
    steps:
      - name: tasks
        uses: speckit.tasks
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}
        # No gate for quick turnaround

  # Phase 4: Implementation
  - name: implementation
    steps:
      - name: implement
        uses: speckit.implement
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}
        timeout: 1800000  # 30 minutes max for bugfixes

  # Phase 5: Verification
  - name: verification
    steps:
      - name: run-tests
        uses: verification.check
        with:
          command: npm test
        continueOnError: false  # Tests must pass for bugfixes

      - name: run-lint
        uses: verification.check
        with:
          command: npm run lint
        continueOnError: true

  # Phase 6: PR Creation
  - name: pr-creation
    condition: ${{ success() }}
    steps:
      - name: create-pr
        uses: pr.create
        with:
          title: "fix: ${{ inputs.description }}"
          body: |
            ## Bug Fix

            Fixes #${{ inputs.issue_number }}

            ### Problem
            ${{ inputs.description }}

            ### Solution
            ${{ steps.specify.output.summary }}

            ### Changes
            - Files modified: ${{ steps.implement.output.files_modified }}

            ### Testing
            - Tests: ${{ steps.run-tests.output.passed ? '✅ Passed' : '❌ Failed' }}

            ---
            Generated by speckit-bugfix workflow
          draft: false  # Bugfixes typically ready for review immediately
