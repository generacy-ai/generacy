# Speckit Feature Development Workflow
#
# Standard feature development workflow using the speckit methodology:
# specify → clarify → plan → tasks → implement → validate
#
# Draft PR is created by the orchestrator after the specify phase and
# updated (commit + push) after every subsequent phase.
#
# Usage:
#   generacy run workflows/speckit-feature.yaml --input description="Your feature description"
#
# Inputs:
#   - description: Feature description text (required)
#   - issue_url: GitHub issue URL for additional context (optional)
#   - short_name: Branch short name override (optional)
#
name: speckit-feature

description: |
  Standard feature development workflow following spec-driven development.
  Creates a feature branch, generates specification, clarifies requirements,
  plans implementation, generates tasks, and executes implementation.
  A draft PR is created after the specify phase and kept up-to-date
  via commits after each phase.

version: "1.1.0"

inputs:
  - name: description
    description: Feature description used to generate spec content
    type: string
    required: true

  - name: issue_url
    description: GitHub issue URL for additional context
    type: string
    required: false

  - name: short_name
    description: Optional short name for the feature branch
    type: string
    required: false

phases:
  # Phase 1: Setup
  - name: setup
    steps:
      - name: create-feature
        uses: speckit.create_feature
        with:
          description: ${{ inputs.description }}
          short_name: ${{ inputs.short_name }}

  # Phase 2: Specification
  # After completion: orchestrator commits, pushes, and creates draft PR
  - name: specification
    steps:
      - name: specify
        uses: speckit.specify
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}
          issue_url: ${{ inputs.issue_url }}

  # Phase 3: Clarification
  # In headless mode: posts questions to issue, exits; orchestrator pauses via gate
  # On resume: reads answers from issue comments, integrates into spec
  - name: clarification
    steps:
      - name: clarify
        uses: speckit.clarify
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}

  # Phase 4: Planning
  - name: planning
    steps:
      - name: plan
        uses: speckit.plan
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}

  # Phase 5: Task Generation
  - name: task-generation
    steps:
      - name: tasks
        uses: speckit.tasks
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}

  # Phase 6: Implementation
  - name: implementation
    steps:
      - name: implement
        uses: speckit.implement
        with:
          feature_dir: ${{ steps.create-feature.output.feature_dir }}
        timeout: 3600000  # 1 hour max

  # Phase 7: Verification
  # After completion: orchestrator marks PR ready for review
  - name: verification
    steps:
      - name: run-tests
        uses: verification.check
        with:
          command: npm test
        continueOnError: true

      - name: run-lint
        uses: verification.check
        with:
          command: npm run lint
        continueOnError: true
