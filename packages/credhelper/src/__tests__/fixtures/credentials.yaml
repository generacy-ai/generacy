schemaVersion: "1"
credentials:
  - id: github-main-org
    type: github-app
    backend: generacy-cloud
    backendKey: github-apps/main-org
    mint:
      ttl: 1h
      scopeTemplate:
        repositories: required
        permissions: required

  - id: gcp-dev-project
    type: gcp-service-account
    backend: generacy-cloud
    backendKey: gcp/dev-sa-email
    mint:
      ttl: 1h
      scopeTemplate:
        scopes: required

  - id: stripe-test
    type: stripe-restricted-key
    backend: generacy-cloud
    backendKey: stripe/test-restricted

  - id: sendgrid
    type: api-key
    backend: generacy-cloud
    backendKey: sendgrid/key
