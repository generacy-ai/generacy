name: Publish VS Code Extension

on:
  push:
    tags:
      - 'extension-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Build extension
        run: |
          cd packages/generacy-extension
          pnpm run build

      - name: Run tests
        run: |
          cd packages/generacy-extension
          pnpm test

      - name: Package extension
        run: |
          cd packages/generacy-extension
          npx vsce package --no-dependencies

      - name: Publish to Marketplace
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/extension-v')
        run: |
          cd packages/generacy-extension
          npx vsce publish --pat ${{ secrets.VSCE_PAT }} --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: generacy-extension-vsix
          path: packages/generacy-extension/*.vsix
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/extension-v')
        uses: softprops/action-gh-release@v1
        with:
          files: packages/generacy-extension/*.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
