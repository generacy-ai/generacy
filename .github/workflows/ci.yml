name: CI

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (root)
        run: pnpm lint

      - name: Lint (packages)
        run: pnpm -r run --if-present lint

      - name: Build (packages)
        run: pnpm -r run --if-present build

      - name: Build (root)
        run: pnpm build

      - name: Typecheck (packages)
        run: pnpm -r --filter '!generacy-extension' run --if-present typecheck

      - name: Test (root)
        run: pnpm test

      - name: Test (packages)
        run: pnpm -r --filter '!@generacy-ai/orchestrator' --filter '!@generacy-ai/generacy' run --if-present test
