name: Publish Preview

# Publishes a preview release on every push to develop. Also supports
# manual dispatch via the Actions UI or:
#   gh workflow run publish-preview.yml --ref <branch>

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      force_rollback:
        description: 'Skip staleness guard for deliberate rollback. Logs a warning. Use only during incident response.'
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `git merge-base --is-ancestor` in the staleness
          # check (T005) can walk back to the currently-published @preview SHA.
          fetch-depth: 0

      - name: Resolve origin/develop HEAD
        # PRIMARY race defense (D6 / FR-002): `actions/checkout` pins the
        # event-time ref. If a PR merges between event-queue and job-start,
        # that ref is already stale. Resolving origin/develop at build time
        # ensures every subsequent step (install, build, version, stamp,
        # publish) operates on the post-merge HEAD.
        run: |
          git fetch origin develop
          git checkout origin/develop
          echo "Resolved HEAD: $(git rev-parse HEAD)"

      - name: Check preview staleness
        # Refuse to publish if the resolved HEAD is a strict ancestor of the
        # currently-published @preview gitHead. Fail-fast: no retry, no
        # self-redispatch (FR-006). Skipped on workflow_dispatch when the
        # operator sets force_rollback=true (D5).
        if: github.event.inputs.force_rollback != 'true'
        run: node scripts/check-preview-staleness.mjs

      - name: Log rollback override warning
        # Auditable record that an operator deliberately skipped the
        # staleness guard. Only fires on workflow_dispatch (push events
        # cannot supply inputs, so this condition is always false there).
        if: github.event.inputs.force_rollback == 'true'
        run: |
          candidate=$(git rev-parse HEAD)
          current=$(npm view @generacy-ai/generacy@preview gitHead 2>/dev/null || echo '<none>')
          echo "WARNING: force_rollback=true — skipping staleness check."
          echo "  candidate    = ${candidate}"
          echo "  current      = ${current}"
          echo "  This is an auditable, deliberate backward publish."

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (packages)
        run: pnpm -r run --if-present build

      - name: Build (root)
        run: pnpm build

      - name: Ensure changesets for preview
        # Always write a synthetic changeset covering every non-private package,
        # alongside any user-authored ones. `changeset version --snapshot preview`
        # only rewrites internal `workspace:*` deps in packages it bumps, so if a
        # user changeset bumps only a subset of packages, dependents like
        # control-plane → credhelper retain `workspace:*` in their source — the
        # prepublishOnly guardrail then aborts the publish.
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const config = JSON.parse(fs.readFileSync('.changeset/config.json', 'utf8'));
            const ignore = new Set(config.ignore || []);
            const pkgs = fs.readdirSync('packages')
              .map(d => path.join('packages', d, 'package.json'))
              .filter(p => fs.existsSync(p))
              .map(p => JSON.parse(fs.readFileSync(p, 'utf8')))
              .filter(p => !p.private && p.name && !ignore.has(p.name));
            const lines = ['---', ...pkgs.map(p => '\"' + p.name + '\": patch'), '---', '', 'Preview publish (synthetic)', ''];
            fs.writeFileSync('.changeset/preview-publish.md', lines.join('\n'));
            console.log('Created synthetic changeset for ' + pkgs.length + ' packages');
          "

      - name: Version (snapshot)
        run: pnpm changeset version --snapshot preview

      - name: Stamp source SHA
        # Must run AFTER `Version (snapshot)` (which rewrites `version`) and
        # BEFORE the verify+publish steps (so they see the final manifest
        # with `gitHead` + `generacy.sourceSha` populated and the `-<sha7>`
        # suffix appended to `version`).
        run: node scripts/stamp-source-sha.mjs

      - name: Verify no workspace protocol leaks in packed tarballs
        run: node scripts/verify-pack-no-workspace-deps.js

      - name: Publish preview
        run: pnpm -r --filter '!generacy-extension' publish --tag preview --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-devcontainer-feature:
    needs: publish-npm
    uses: ./.github/workflows/publish-devcontainer-feature.yml
    with:
      mode: preview
    secrets: inherit
