name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (packages)
        run: pnpm -r run --if-present build

      - name: Build (root)
        run: pnpm build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm -r --filter '@generacy-ai/*' publish --tag stable --no-git-checks --provenance
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Add @stable dist-tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@generacy-ai/generacy") | .version')
          if [ -n "$VERSION" ]; then
            echo "Adding @stable dist-tag for @generacy-ai/generacy@$VERSION"
            npm dist-tag add @generacy-ai/generacy@$VERSION stable
          else
            echo "Package @generacy-ai/generacy not in published set, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-devcontainer-feature:
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/publish-devcontainer-feature.yml
    with:
      mode: stable
    secrets: inherit
