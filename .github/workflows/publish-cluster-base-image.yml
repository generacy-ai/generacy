name: Publish Cluster Base Image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to build (develop or main)"
        type: choice
        options:
          - develop
          - main
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: generacy-ai/cluster-base
          ref: ${{ inputs.ref }}

      - name: Determine image tags
        id: tags
        run: |
          if [ "${{ inputs.ref }}" = "develop" ]; then
            echo "channel=preview" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=sha-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          # Build context = directory containing the Dockerfile + its COPY sources
          # (scripts/, code-server-extensions.txt). Cluster-base#17 removed the
          # repo-internal publish workflow that knew this; this generacy-side
          # workflow had been inheriting `.` (repo root) which has no Dockerfile.
          context: .devcontainer/generacy
          push: true
          tags: |
            ghcr.io/generacy-ai/cluster-base:${{ steps.tags.outputs.channel }}
            ghcr.io/generacy-ai/cluster-base:${{ steps.tags.outputs.sha }}
