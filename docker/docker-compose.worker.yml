# Worker Service - Docker Compose for Local Development
#
# Usage: docker-compose -f docker/docker-compose.worker.yml up

version: '3.8'

services:
  worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    container_name: generacy-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - WORKER_ID=worker-local-1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HEALTH_PORT=3001
      - HEARTBEAT_ENABLED=true
      - HEARTBEAT_INTERVAL=5000
      - POLL_INTERVAL=1000
      - GRACEFUL_SHUTDOWN_TIMEOUT=60000
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - generacy-network

  redis:
    image: redis:7-alpine
    container_name: generacy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - generacy-network

volumes:
  redis-data:

networks:
  generacy-network:
    driver: bridge
