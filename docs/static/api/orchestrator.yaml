openapi: 3.0.3
info:
  title: Generacy Orchestrator API
  description: REST API for Generacy workflow orchestration
  version: 1.0.0
  contact:
    name: Generacy Team
    url: https://github.com/generacy-ai/generacy
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.generacy.ai/v1
    description: Production

tags:
  - name: Jobs
    description: Job management endpoints
  - name: Workflows
    description: Workflow management endpoints
  - name: Gates
    description: Review gate management endpoints
  - name: Health
    description: Health check endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    example: 1.0.0

  /jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  total:
                    type: integer

    post:
      tags: [Jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'

  /jobs/{id}:
    get:
      tags: [Jobs]
      summary: Get a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Jobs]
      summary: Cancel a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled
        '404':
          $ref: '#/components/responses/NotFound'

  /workflows:
    get:
      tags: [Workflows]
      summary: List workflows
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflows:
                    type: array
                    items:
                      $ref: '#/components/schemas/Workflow'

  /workflows/{id}:
    get:
      tags: [Workflows]
      summary: Get a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'

  /workflows/{id}/trigger:
    post:
      tags: [Workflows]
      summary: Trigger a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                inputs:
                  type: object
      responses:
        '200':
          description: Workflow triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRun'

  /gates:
    get:
      tags: [Gates]
      summary: List review gates
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: List of gates
          content:
            application/json:
              schema:
                type: object
                properties:
                  gates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Gate'

  /gates/{id}:
    get:
      tags: [Gates]
      summary: Get a gate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Gate details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gate'

  /gates/{id}/approve:
    post:
      tags: [Gates]
      summary: Approve a gate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        '200':
          description: Gate approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gate'

  /gates/{id}/reject:
    post:
      tags: [Gates]
      summary: Reject a gate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  required: true
      responses:
        '200':
          description: Gate rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gate'

components:
  schemas:
    Job:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        data:
          type: object
        priority:
          type: string
          enum: [low, normal, high]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        result:
          type: object
        error:
          type: string

    CreateJobRequest:
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
        data:
          type: object
        priority:
          type: string
          enum: [low, normal, high]
          default: normal

    Workflow:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        triggers:
          type: array
          items:
            type: object
        stages:
          type: array
          items:
            type: object

    WorkflowRun:
      type: object
      properties:
        id:
          type: string
        workflowId:
          type: string
        status:
          type: string
          enum: [running, paused, completed, failed]
        currentStage:
          type: string
        startedAt:
          type: string
          format: date-time

    Gate:
      type: object
      properties:
        id:
          type: string
        workflowRunId:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        reviewers:
          type: array
          items:
            type: string
        requiredApprovals:
          type: integer
        approvals:
          type: array
          items:
            type: object
            properties:
              reviewer:
                type: string
              approvedAt:
                type: string
                format: date-time
              comment:
                type: string
        createdAt:
          type: string
          format: date-time
        timeout:
          type: string

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

security:
  - bearerAuth: []
