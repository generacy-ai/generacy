<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="agencyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="humancyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="generacyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1e293b">The Generacy Triad</text>

  <!-- Agency Box -->
  <rect x="50" y="150" width="200" height="120" rx="12" fill="url(#agencyGrad)"/>
  <text x="150" y="200" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Agency</text>
  <text x="150" y="230" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.9">Agent Enhancement</text>
  <text x="150" y="250" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.8">MCP Tools + Context</text>

  <!-- Humancy Box -->
  <rect x="300" y="400" width="200" height="120" rx="12" fill="url(#humancyGrad)"/>
  <text x="400" y="450" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Humancy</text>
  <text x="400" y="480" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.9">Human Oversight</text>
  <text x="400" y="500" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.8">Review Gates + Audit</text>

  <!-- Generacy Box -->
  <rect x="550" y="150" width="200" height="120" rx="12" fill="url(#generacyGrad)"/>
  <text x="650" y="200" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">Generacy</text>
  <text x="650" y="230" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" fill="white" opacity="0.9">Orchestration</text>
  <text x="650" y="250" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.8">Workflows + Jobs</text>

  <!-- Connecting Lines -->
  <line x1="250" y1="210" x2="550" y2="210" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="150" y1="270" x2="300" y2="400" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="650" y1="270" x2="500" y2="400" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Developer -->
  <circle cx="400" cy="130" r="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="400" y="125" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" fill="#64748b">👨‍💻</text>
  <text x="400" y="145" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#64748b">Developer</text>

  <!-- Developer connections -->
  <line x1="360" y1="130" x2="250" y2="180" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="440" y1="130" x2="550" y2="180" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="400" y1="170" x2="400" y2="400" stroke="#cbd5e1" stroke-width="2"/>

  <!-- External Services -->
  <rect x="620" y="350" width="150" height="80" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="695" y="380" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">External Services</text>
  <text x="695" y="400" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#94a3b8">GitHub • Jira • Slack</text>

  <line x1="650" y1="270" x2="670" y2="350" stroke="#cbd5e1" stroke-width="2"/>
</svg>
